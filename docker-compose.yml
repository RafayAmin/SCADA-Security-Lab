services:
  plc:
    build:
      context: ./docker
      dockerfile: Dockerfile.plc
    hostname: plc
    networks:
      scada_net:
        ipv4_address: 172.20.0.10
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "127.0.0.1:502:502"

  hmi:
    build:
      context: ./docker
      dockerfile: Dockerfile.hmi
    hostname: hmi
    networks:
      scada_net:
        ipv4_address: 172.20.0.11
    depends_on:
      - plc

  snort:
    build:
      context: .
      dockerfile: docker/Dockerfile.snort
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./snort/logs:/var/log/snort
    networks:
      scada_net:
        ipv4_address: 172.20.0.20
    depends_on:
      - plc
      - hmi

  strongswan:
    build:
      context: .
      dockerfile: docker/Dockerfile.strongswan
    hostname: strongswan
    privileged: true
    cap_add:
      - NET_ADMIN
    networks:
      scada_net:
        ipv4_address: 172.20.0.30
    depends_on:
      - plc
      - hmi

networks:
  scada_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
