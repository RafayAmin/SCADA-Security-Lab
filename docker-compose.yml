services:
  plc:
    build:
      context: ./docker
      dockerfile: Dockerfile.plc
    hostname: plc
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      scada_net:
        ipv4_address: 172.20.0.10
    ports:
      - "127.0.0.1:502:502"

  hmi:
    build:
      context: ./docker
      dockerfile: Dockerfile.hmi
    hostname: hmi
    networks:
      scada_net:
        ipv4_address: 172.20.0.11
    depends_on:
      - plc

  snort:
    build:
      context: .
      dockerfile: docker/Dockerfile.snort
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./snort/logs:/var/log/snort
    networks:
      scada_net:
        ipv4_address: 172.20.0.20
    depends_on:
      - plc
      - hmi

  strongswan:
    build:
      context: .
      dockerfile: docker/Dockerfile.strongswan
    hostname: strongswan
    privileged: true
    cap_add:
      - NET_ADMIN
    networks:
      scada_net:
        ipv4_address: 172.20.0.30
    depends_on:
      - plc
      - hmi

  iotgoat:
    build:
      context: .
      dockerfile: docker/Dockerfile.iotgoat
    hostname: iotgoat
    ports:
      - "2222:2222"
      - "8080:8080"
      - "4443:4443"
    volumes:
      - iotgoat_data:/opt
    networks:
      scada_net:
        ipv4_address: 172.20.0.40
    tty: true
    stdin_open: true

volumes:
  iotgoat_data:

networks:
  scada_net:
    # Note: Had to use a custom subnet here because the default bridge
    # was conflicting with my host machine's VPN IP range
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
